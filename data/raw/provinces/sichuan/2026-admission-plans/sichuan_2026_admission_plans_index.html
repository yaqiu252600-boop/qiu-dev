			.fl li {

				float: left;

			.fl li span {

			}

			.top {
				position: fixed;
				bottom: 9%;
				right: 1%;
				cursor: pointer;
			}

			.banner {
				margin: 0 auto;
				width: 1200px;
			}

			/* 清除浮动 */
			.clearfix:after {
				content: ".";
				display: block;
				height: 0;
				visibility: hidden;
				clear: both;
			}

			.clearfix {
				*zoom: 1;
			}
			
			.wkrk{
